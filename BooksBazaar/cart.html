<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Books Bazaar</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark rounded-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="img/logo.jpg" alt="Books Bazaar Logo"
                    class="d-inline-block align-text-top me-2 rounded-pill me-3" style="width: 60px;">
                <span class="fw-bold">Books Bazaar</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="books.html"><i class="bi bi-basket"></i> Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html"><i class="bi bi-info-circle"></i> About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html"><i class="bi bi-envelope"></i> Contact</a></li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cart.html">
                            <i class="bi bi-cart"></i>
                            Cart
                            <span class="badge bg-light text-dark ms-1 cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <section class="mb-4 text-center">
            <h1 class="fw-bold mb-3">Your Cart</h1>
            <p class="text-muted">
                Review the books in your cart. You can update quantities or remove items before proceeding.
            </p>
        </section>

        <section class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th scope="col">Book</th>
                                <th scope="col">Details</th>
                                <th scope="col">Price</th>
                                <th scope="col">Quantity</th>
                                <th scope="col">Total</th>
                                <th scope="col"></th>
                            </tr>
                        </thead>
                        <tbody id="cart-items">
                            <!-- Filled by script.js -->
                        </tbody>
                    </table>
                </div>

                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mt-3">
                    <div class="mb-3 mb-md-0">
                        <button id="clear-cart" class="btn btn-outline-danger">
                            <i class="bi bi-trash"></i> Clear Cart
                        </button>
                        <a href="books.html" class="btn btn-outline-secondary ms-2">
                            <i class="bi bi-arrow-left"></i> Continue Shopping
                        </a>
                    </div>
                    <div class="text-md-end">
                        <h5 class="mb-1">Grand Total:</h5>
                        <p class="fs-4 fw-bold text-danger mb-2" id="cart-total">₹0</p>
                        <button class="btn btn-dark" id="checkout-btn">
                            Proceed to Checkout
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">© 2026 Books Bazaar | All Rights Reserved</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();

        document.addEventListener("DOMContentLoaded", function () {
            const checkoutBtn = document.getElementById("checkout-btn");
            checkoutBtn.addEventListener("click", function () {
                alert("This is a demo cart. In a real project, this would take you to a secure checkout page.");
            });
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
